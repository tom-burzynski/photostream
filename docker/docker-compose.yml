services:
  photostream:
    build: .
    container_name: photostream-watcher
    restart: unless-stopped

    # Port mappings
    ports:
      - "8080:8080"                            # Web server for live preview

    # Volume mappings
    volumes:
      - ./originals:/app/originals             # Source photos
      - ./site:/app/site                       # Generated site output
      # Example: Mount to web server directory
      # - /var/www/html/gallery:/app/site       # Direct deployment to web server
      # - /path/to/your/site:/app/site          # Mount to your chosen location

    # Environment variables for configuration
    environment:
      # Gallery build settings
      - PREVIEW_HEIGHT=${PREVIEW_HEIGHT}       # Max preview image height
      - PRELOAD_COUNT=${PRELOAD_COUNT}         # Number of images to preload for LCP
      - WORKERS=${WORKERS}                     # Number of worker threads

      # Image processing
      - RENAME=${RENAME}                       # Auto-rename images to EXIF datetime format
      - GEOCODE=${GEOCODE}                     # Enable GPS geocoding lookups
      - REGEOCODE=${REGEOCODE}                 # Retry geocoding for photos without location data

      # Site customization
      - TITLE=${TITLE}                         # Gallery title
      - DESCRIPTION=${DESCRIPTION}             # Gallery description
      - FOOTER=${FOOTER}                       # Footer text
      - LINK1_TITLE=${LINK1_TITLE}             # First footer link title
      - LINK1_URL=${LINK1_URL}                 # First footer link URL
      - LINK2_TITLE=${LINK2_TITLE}             # Second footer link title
      - LINK2_URL=${LINK2_URL}                 # Second footer link URL
      - LINK3_TITLE=${LINK3_TITLE}             # Third footer link title
      - LINK3_URL=${LINK3_URL}                 # Third footer link URL

      # Watcher settings
      - WATCH_DELAY=${WATCH_DELAY}             # Seconds to wait after file change
      - RUN_ON_STARTUP=${RUN_ON_STARTUP}       # Build gallery on container start
      - LOG_LEVEL=${LOG_LEVEL}                 # Logging level
      - WEB_SERVER_PORT=${WEB_SERVER_PORT:-8080}  # Port for live preview web server

    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "inotifywait"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
