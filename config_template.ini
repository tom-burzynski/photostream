# Photostream Configuration File
# Copy this file to config.ini and customize the values for your gallery

[build]
# Path to source folder containing original images
folder = ./originals

# Path to output directory for generated site
out_dir = ./site

# Number of worker threads for parallel image processing
# Leave empty to use number of CPU cores
workers = 8

# Path to custom template directory (leave empty to use default ./templates/)
template_dir =

# Maximum preview image height in pixels (lower = smaller files, faster loading)
preview_height = 500

# Number of images to preload for LCP optimization
preload_count = 20

# Enable automatic image renaming based on EXIF datetime (true/false)
rename = true

# Enable reverse geocoding for GPS coordinates (requires internet connection, true/false)
geocode = true

# Retry geocoding for photos without location data (true/false)
regeocode = true


[gallery]
# Site title displayed in browser tab and top-left corner overlay
title = [photostream]

# Optional description text under the title
description = wherever you go, there you are...

# Optional footer text at bottom-right (e.g., copyright notice)
footer = Copyright (©) 2025, Tom Burzynski

# Optional footer links (leave empty to disable)
link1_title = Photostream
link1_url = https://github.com/tom-burzynski/photostream

link2_title =
link2_url =

link3_title =
link3_url =


[deployment]
# Deployment method: rsync, rclone, or leave empty to disable
method = rclone

# Rsync destination for deployment (format: user@host:/path or host:/path)
rsync_destination = mediavault:/home/vps-user/docker/composer/nginx/html/dayvancowboy.net

# Rclone destination for deployment (format: remote:path)
rclone_destination = mediavault:dayvancowboy.net

# Robocopy destination for Windows deployment (format: C:\path or \\server\share\path)
robocopy_destination =
